dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: redir-host
  nameserver:
    - 114.114.114.114
    - 119.29.29.29
    - 223.5.5.5
  fallback:
    - tls://1.1.1.1:853
    - tcp://1.1.1.1:53
    - tls://dns.google
  fallback-filter:
    geoip: true
    ipcidr:
      - 240.0.0.0/4
proxies: ~
proxy-groups: ~
rules:
  - GEOIP,CN,DIRECT
  - MATCH,FISHNET
