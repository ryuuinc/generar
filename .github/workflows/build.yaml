name: Build

on: [push]

jobs:
  build:
    env:
      SEC_IP: ${{ secrets.IP }}
      SEC_KEY: ${{ secrets.KEY }}
      SEC_USERNAME: ${{ secrets.USERNAME }}
      SEC_PASSWORD: ${{ secrets.PASSWORD }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Configuration environment
        run: |
          mkdir -p ~/.ssh/
          echo "$SEC_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 -p 56789 $SEC_IP >> ~/.ssh/known_hosts
      - uses: docker/build-push-action@v1
        with:
          username: $SEC_USERNAME
          password: $SEC_PASSWORD
          repository: ryuuinc/generar
          tags: latest
      - name: Update Docker image
        run: |
          ssh root@$SEC_IP -p 56789 "docker pull ryuuinc/generar"
